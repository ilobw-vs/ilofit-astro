title: Treeniohjelma
hero_eyebrow: Palvelut
hero_heading: Treeniohjelma
hero_text1: >-
  Teen sinulle yksilöllisen treeniohjelman, joka sopii juuri sinun
  tavoitteisiisi, arkeesi ja kuntotasoosi. Ohjelma laaditaan kattavan
  taustatietolomakkeen ja haastattelun pohjalta.
hero_text2: Treeniohjelmalla voit harjoitella kotona ja kuntosalilla — mielesi mukaan.
hero_cta: Täytä taustatietolomake
hero_image: /images/training_program.webp

included_heading: Sisältää
included:
  - Alkuhaastattelu
  - Henkilökohtaisten toiveiden, tavoitteiden ja rajoitteiden huomioiminen
  - Yksilöllinen treeniohjelma (1–3 jakoinen ohjelma)
  - Jos sinulla on kehonkoostumusmittaustulokset, hyödynnän ne ohjelmassasi veloituksetta

base_price_label: Yksilöllinen treeniohjelma
base_price: 35 €

addons_heading: Lisäpalvelut
addons:
  - label: Opastettu valmennussessio 75 minuuttia (valinnainen)
    price: "60 €"

plus_heading: Plus-palvelu kuukausitilauksena
plus_desc: >-
  Palveluun kuuluu kuukausittainen palaveri, jossa käydään läpi onnistumiset ja
  kehitystarpeet sekä tarvittaessa muokataan ohjelmia. Minimikesto 3 kuukautta.
  Hinnat toistaiseksi voimassa 1kk irtisanomisajalla.
plus_price_label: Plus-palvelu
plus_price: 30 € / kk

addon_cards_eyebrow: Lisäpalvelut
addon_cards_heading: Tee ohjelmasta täydellinen paketti
addon_cards_desc: >-
  Voit täydentää treeniohjelmaa yhdellä tai useammalla lisäpalvelulla. Tilaus
  tapahtuu samalla lomakkeella.
addon_cards:
  - title: Ravinto-osuus
    desc: >-
      Käytännönläheinen ravinto-ohje tukemaan treenitavoitteitasi. Ei tiukkaa
      dieettiä — järkeviä muutoksia.
    price: "+10 €"
  - title: Liikkuvuus- ja venyttelyohjelma
    desc: >-
      Räätälöity ohjelma treeniohjelman tueksi. Parantaa palautumista ja ehkäisee
      vammoja.
    price: "+10 €"
  - title: Parivalmennus
    desc: >-
      Sama ohjelma kahdelle — kaverille tai puolisolle. Treenaaminen yhdessä on
      motivoivampaa.
    price: "[XX €]"
  - title: Opastettu valmennussessio
    desc: >-
      75 minuutin sessio, jossa käymme ohjelman läpi yhdessä. Opit tekniikan
      oikein heti alusta.
    price: "+60 €"

monthly_eyebrow: Jatkuva tuki
monthly_heading: Kuukausittainen checkpoint
monthly_text: >-
  Tulokset syntyvät johdonmukaisesta harjoittelusta — ja siitä, että ohjelma
  pysyy ajan tasalla. Kuukausittaisessa checkpointissa käymme yhdessä läpi
  kehityksesi ja päivitämme ohjelman tarvittaessa.
monthly_items:
  - Kuukausittainen tapaaminen tai etäsessio
  - Ohjelman päivitys kehityksen mukaan
  - Tuki ja kysymykset viestitse kuukauden aikana
  - Minimissään 3 kuukauden sitoutuminen
  - Irtisanominen 1 kk ennen seuraavaa jaksoa
monthly_price: "[XX €]"
monthly_cta: Aloita kuukausituki

update_eyebrow: Vanha asiakas?
update_heading: Ohjelmapäivitys
update_desc: >-
  Onko ohjelmasi jo muutaman kuukauden vanha? Päivitetään se vastaamaan
  nykytilannettasi ja uusia tavoitteitasi — ilman täyttä alkukartoitusta.
update_price: "[XX €]"
update_cta: Tilaa päivitys
