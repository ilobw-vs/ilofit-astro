info_heading: Treeniä ulkona, ympäri vuoden
info_text1: >-
  Ulkotreeni on monipuolinen ja tehokas tapa harjoitella. Kehonpainoliikkeet,
  toiminnallinen harjoittelu ja luovuus ovat kulmakiviä.
info_text2: Treenit sopivat kaikille kuntotasoille — jokainen tekee omaan tahtiinsa, mutta yhdessä.
