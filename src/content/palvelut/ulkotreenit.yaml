hero_heading: Ulkotreenit
hero_text: >-
  Ulkotreeneissä treenaamme monipuolisesti lihas- sekä kestävyyskuntoa omalla
  kehonpainolla, pienvälineitä ja ulkokuntosalin laitteita hyödyntäen.
  Tehokkaat ja hauskat treenit kaiken tasoisille treenaajille.
