title: Treenimatkat
hero_eyebrow: Treenimatkat
hero_heading: Treeni- ja hyvinvointiloma Rodokselle 10–17.5.2026
hero_text: Lähde viettämään aktiivista hyvinvointilomaa Rodokselle! Luvassa on sopivasti treeniä sekä rentoutumista, maukasta ja terveellistä Välimeren ruokaa sekä paljon erilaisia aktiviteetteja — unohtamatta omaa aikaa esim. altaalla löhöillen tai retkeillen. Samanhenkisen matkaseuran kanssa viikko on hauska ja ikimuistoinen. Treenit skaalataan kuntotason mukaan, eikä osallistuminen yhteisiin treeneihin ole pakollista.
hero_cta: Ilmoittaudu mukaan
hero_image: /images/rhodos_trip.avif

hotel_eyebrow: Majoitus
hotel_heading: Hotelli Levante by Playitas
hotel_stars: 5
hotel_text1: Hotelli sijaitsee noin 30 minuutin matkan päässä Rodoksen kaupungista etelään, rauhallisessa ympäristössä Afandoun rannalla.
hotel_text2: Sporttihotellissa löytyy muun muassa iso kuntosali, 4 tenniskenttää, 2 padel-kenttää, tilava uima-allas ja erilaisia liikuntaryhmiä sekä kaunis uimaranta. Lisää urheilumahdollisuuksista löytyy paikan päältä.
hotel_text3: Kävelymatkan päässä hotellista on Kolymbian kylä, ja sukkulabussit vievät Rodoksen kaupunkiin.
hotel_image: /images/hotel_rhodos.avif

