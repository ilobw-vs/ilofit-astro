program_heading: Esimerkki päivän ohjelmasta
program_text: Aamut alkavat joko Ilonan ohjaamalla treenillä tai joogalla taikka kehon herättelyllä aamulenkin tai -kävelyn muodossa. Päivän rankempi treeni on joko lihaskunto- tai kestävyysharjoitus. Lounaan jälkeen on aikaa rentoutumiselle, altaalla lojumiselle, retkeilylle tai kuntosalille. Venyttely kuuluu myös päiväohjelmaan.
program_image: /images/rhodos_training.avif

