benefits_heading: Pienryhmän edut
benefits:
  - Max. 10 henkilöä — yksilöllinen huomio taattu
  - Ryhmän energia ja motivaatio nostaa suoritusta
  - Edullisempi kuin yksilövalmennus
  - Hyvä tapa treenata kaverin kanssa
  - Monipuolinen ja vaihtelevainen treeni
  - Sopii kaikille kuntotasoille

suitable_eyebrow: Kenelle sopii
suitable_heading: Kenelle pienryhmävalmennus sopii?
suitable_for:
  - title: Kaveriryhmät
    desc: Treenaa parhaan kaverin kanssa ja pidä motivaatio korkealla.
  - title: Äidit
    desc: Löydä aikaa itsellesi ja tapaa muita samassa elämäntilanteessa olevia.
  - title: Kollegat
    desc: Tiimi, joka treenaa yhdessä, pysyy yhdessä. Hyvä vaihtoehto tyky-aktiviteeteille.
  - title: Aloittelijat
    desc: Ryhmässä on matala kynnys aloittaa — ei pelottele kuten iso kuntosali.

