eyebrow: Sertifioitu Personal Trainer
heading: Hei, olen Ilona
image: /images/ilona.webp
paragraphs:
  - "Olen 48-vuotias helposti lähestyttävä, positiivinen ja kannustava Personal
    Trainer Turusta. "
  - Olen aina liikkunut aktiivisesti ja nuorempana harrastanut muun muassa
    joukkuevoimistelua, josta kipinä liikuntaan ja terveellisiin elämäntapoihin
    jäikin sitten loppuiäksi.
  - "Haluan auttaa ihmisiä voimaan kokonaisvaltaisesti hyvin ilman liikaa
    tiukkapipoisuutta. Kahden lapsen äitinä minulle on erityisen tuttua
    perhe-elämän ja työn yhteensovittamisen haasteet ruuhkavuosien ja arjen
    kiireessä, jolloin helposti laiminlyödään omaa hyvinvointia. On kuitenkin
    paljon tapoja lisätä liikuntaa ja terveyttä edistäviä tekoja jokaiseen
    päivään, kunhan käyttää vähän luovuutta ja suunnitelmallisuutta! Kyse ei ole
    vain fyysisestä vahvuudesta, vaan kokonaisvaltaisesta hyvinvoinnista ja
    tasapainosta arkeen rennolla ja järkevällä otteella. Valmennan lempeän
    jämäkästi – kuunnellen, kannustaen ja sopivasti haastaen.  "
  - Tykkään ohjata etenkin toiminnallisia treenejä, niin sisällä kuin ulkona ja
    pitää harjoitukset mahdollisimman monipuolisina ja hauskoina.  Omat
    harrastukseni painottuvat tällä hetkellä kuntosaliharjoitteluun ja padeliin.
    Lisäksi viihdyn luonnossa liikkuen ja tykkään joogata, mikä tuo hyvää
    vastapainoa kiireiseen arkeen.
