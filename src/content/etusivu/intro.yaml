eyebrow: Sertifioitu Personal Trainer
heading: "Hei, olen Ilona"
image: /images/ilona.webp
paragraphs:
  - "Olen 47-vuotias helposti lähestyttävä, positiivinen ja kannustava Personal Trainer Turusta. On kuitenkin paljon tapoja lisätä liikuntaa jokaiseen päivään, kunhan käyttää vähän luovuutta ja suunnitelmallisuutta!"
  - "Olen aina liikkunut aktiivisesti ja nuorempana harrastanut muun muassa joukkuevoimistelua, josta kipinä liikuntaan ja terveellisiin elämäntapoihin jäikin sitten loppuiäksi."
  - "Haluan auttaa ihmisiä voimaan kokonaisvaltaisesti hyvin ilman liikaa tiukkapipoisuutta. Kahden lapsen äitinä minulle on erityisen tuttua perhe-elämän ja työn yhteensovittamisen haasteet ruuhkavuosien ja arjen kiireessä, jolloin helposti laiminlyödään omaa hyvinvointia."
  - "Tykkään ohjata etenkin toiminnallisia treenejä, niin sisällä kuin ulkona ja pitää harjoitukset mahdollisimman monipuolisina ja vaihtelevina sekä hauskoina. Omiin harrastuksiini kuuluu tällä hetkellä padel, kuntosali, juoksu- ja koiralenkit sekä päivittäiset lyhyet joogahetket."
